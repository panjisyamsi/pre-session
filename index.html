<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panji Syamsi | Temukan Bantuan yang Tepat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  /* ========== CSS VARIABLES ========== */
  :root {
    --cream:    #F5F0E8;
    --warm:     #EDE5D4;
    --sand:     #C9B99A;
    --rust:     #8B5E3C;
    --deep:     #2C1A0E;
    --forest:   #3A5A40;
    --sage:     #7A9E7E;
    --alert:    #C0392B;
    --gold:     #B8860B;
    --white:    #FEFCF8;
    --text:     #2C1A0E;
    --muted:    #7A6A58;
    --border:   #D4C4A8;
    --shadow:   rgba(44,26,14,0.12);
    --radius:   12px;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body:    'DM Sans', sans-serif;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ========== RESET ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
    font-size: 15px;
  }

  /* ========== LAYOUT ========== */
  .app-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 4px 32px var(--shadow);
    width: 100%;
    max-width: 620px;
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rust), var(--sand), var(--gold));
  }

  /* ========== HEADER ========== */
  .app-header {
    width: 100%;
    max-width: 620px;
    padding: 32px 0 24px;
    text-align: center;
  }

  .brand-name {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rust);
  }

  .brand-tag {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ========== PROGRESS BAR ========== */
  .progress-wrap {
    margin-bottom: 28px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 3px;
    background: var(--warm);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rust), var(--gold));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ========== TYPOGRAPHY ========== */
  h1 {
    font-family: var(--font-display);
    font-size: clamp(26px, 5vw, 34px);
    font-weight: 400;
    line-height: 1.25;
    color: var(--deep);
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    color: var(--rust);
  }

  h2 {
    font-family: var(--font-display);
    font-size: clamp(20px, 4vw, 26px);
    font-weight: 400;
    line-height: 1.3;
    color: var(--deep);
    margin-bottom: 16px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .question-number {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sand);
    margin-bottom: 6px;
  }

  .question-text {
    font-family: var(--font-display);
    font-size: clamp(18px, 3.5vw, 22px);
    font-weight: 400;
    line-height: 1.35;
    color: var(--deep);
    margin-bottom: 8px;
  }

  .question-subtext {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    font-style: italic;
  }

  /* ========== LANGUAGE SELECTOR ========== */
  .lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 24px 0;
  }

  .lang-btn {
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: var(--radius);
    padding: 20px 16px;
    cursor: pointer;
    text-align: center;
    transition: var(--transition);
    font-family: var(--font-body);
  }

  .lang-btn:hover {
    border-color: var(--rust);
    background: var(--warm);
  }

  .lang-flag { font-size: 28px; display: block; margin-bottom: 6px; }
  .lang-label { font-size: 13px; font-weight: 500; color: var(--deep); }
  .lang-sublabel { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ========== FORM FIELDS ========== */
  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text);
    background: var(--white);
    transition: border-color var(--transition);
    outline: none;
    appearance: none;
  }

  .form-input:focus, .form-select:focus {
    border-color: var(--rust);
    box-shadow: 0 0 0 3px rgba(139,94,60,0.1);
  }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 12px;
  }

  /* ========== CONSENT ========== */
  .consent-box {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin: 20px 0 24px;
    padding: 16px;
    background: var(--warm);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .consent-box input[type="checkbox"] {
    margin-top: 2px;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    accent-color: var(--rust);
    cursor: pointer;
  }

  .consent-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ========== OPTIONS ========== */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    transition: var(--transition);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--rust);
    background: var(--warm);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px var(--shadow);
  }

  .option-btn.selected {
    border-color: var(--rust);
    background: linear-gradient(135deg, rgba(139,94,60,0.08), rgba(184,134,11,0.06));
    box-shadow: 0 2px 8px var(--shadow);
  }

  .option-indicator {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .option-btn.selected .option-indicator {
    border-color: var(--rust);
    background: var(--rust);
  }

  .option-btn.selected .option-indicator::after {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
  }

  .option-label { flex: 1; }
  .option-label strong { display: block; margin-bottom: 2px; }
  .option-label small { color: var(--muted); font-size: 12px; }

  /* ========== BUTTONS ========== */
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--rust), #A0522D);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 15px 24px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    letter-spacing: 0.3px;
    margin-top: 24px;
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(139,94,60,0.35);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 10px;
    width: 100%;
  }

  .btn-secondary:hover {
    border-color: var(--rust);
    color: var(--rust);
  }

  /* WhatsApp button */
  .btn-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 16px 24px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: var(--transition);
    margin-top: 16px;
  }

  .btn-wa:hover {
    background: #1ebe5a;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(37,211,102,0.35);
  }

  .btn-wa svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* ========== RESULT CARDS ========== */
  .result-header {
    text-align: center;
    padding: 24px 0 20px;
  }

  .result-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 28px;
  }

  .result-icon.consultant { background: linear-gradient(135deg, rgba(139,94,60,0.12), rgba(184,134,11,0.1)); }
  .result-icon.clinical   { background: linear-gradient(135deg, rgba(58,90,64,0.12), rgba(122,158,126,0.1)); }
  .result-icon.mixed      { background: linear-gradient(135deg, rgba(184,134,11,0.12), rgba(58,90,64,0.1)); }

  .result-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 99px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 16px;
  }

  .badge-consultant { background: rgba(139,94,60,0.1); color: var(--rust); }
  .badge-clinical   { background: rgba(58,90,64,0.1); color: var(--forest); }
  .badge-mixed      { background: rgba(184,134,11,0.1); color: var(--gold); }

  .result-explanation {
    background: var(--warm);
    border-radius: 10px;
    padding: 18px 20px;
    margin: 16px 0;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    border-left: 3px solid var(--sand);
  }

  .what-next-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  .referral-info {
    background: rgba(58,90,64,0.06);
    border: 1px solid rgba(58,90,64,0.2);
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 12px;
  }

  .referral-info a {
    color: var(--forest);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ========== SENSITIVE ALERT ========== */
  .sensitive-notice {
    background: rgba(192,57,43,0.06);
    border: 1px solid rgba(192,57,43,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--alert);
    line-height: 1.6;
    margin: 16px 0;
  }

  /* ========== DIVIDER ========== */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ========== ERROR MESSAGE ========== */
  .error-msg {
    font-size: 12px;
    color: var(--alert);
    margin-top: 6px;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* ========== LOADING ========== */
  .loading-state {
    text-align: center;
    padding: 40px 0;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--warm);
    border-top-color: var(--rust);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    color: var(--muted);
  }

  /* ========== ANIMATIONS ========== */
  .screen {
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ========== FOOTER ========== */
  .app-footer {
    text-align: center;
    padding: 24px 0;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    width: 100%;
    max-width: 620px;
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .lang-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  }
</style>
</head>

/* ============================================================
   STATE
   ============================================================ */
let state = {
  lang: null,       // 'id' | 'en'
  screen: "lang",   // lang | intro | data | question | result
  currentQ: 0,
  answers: {},      // { q1: value, q2: value, ... }
  userData: {},     // { name, phone, age, status }
  result: null,     // 'consultant' | 'clinical' | 'mixed'
  hasSensitiveFlag: false,
};

/* ============================================================
   SCORING ENGINE
   ============================================================ */
function computeResult() {
  const C = CONTENT[state.lang];
  const questions = C.questions;
  const answers = state.answers;

  // Layer 1: Clinical Red Flags
  const layer1Qs = questions.filter(q => q.layer === 1);
  const layer1Scores = layer1Qs.map(q => answers[q.id] ?? 0);

  // Hard clinical triggers:
  // q3 (self-harm) >= 2  → clinical priority
  // q5 (violence) >= 3   → clinical priority  
  // q1 (depression) >= 2 → raise clinical flag
  // q2 (trauma) >= 2     → raise clinical flag
  // q4 (functioning) >= 2 → raise clinical flag
  const q3Score = answers["q3"] ?? 0;
  const q5Score = answers["q5"] ?? 0;
  const q1Score = answers["q1"] ?? 0;
  const q2Score = answers["q2"] ?? 0;
  const q4Score = answers["q4"] ?? 0;

  const hardClinicalTrigger = (q3Score >= 2) || (q5Score >= 3);
  const clinicalFlagCount = [q1Score >= 2, q2Score >= 2, q4Score >= 2, q3Score >= 1, q5Score >= 2]
    .filter(Boolean).length;

  state.hasSensitiveFlag = (q3Score >= 1) || (q5Score >= 2);

  // Layer 2: Relational Dynamics
  const layer2Qs = questions.filter(q => q.layer === 2);
  const layer2Total = layer2Qs.reduce((s, q) => s + (answers[q.id] ?? 0), 0);
  const layer2Max = layer2Qs.length * 3;
  const layer2Ratio = layer2Total / layer2Max;

  // Layer 3: Nature of problem
  const layer3Qs = questions.filter(q => q.layer === 3);
  const layer3Scores = layer3Qs.map(q => answers[q.id] ?? 0);
  // q11 (what do you want): 1 or 2 means individual or mixed
  // q12 (individual impact): >= 2 means clinical leaning
  const q11 = answers["q11"] ?? 0;
  const q12 = answers["q12"] ?? 0;
  const q14 = answers["q14"] ?? 0;

  const individualFocus = (q11 === 1) || (q12 >= 2) || (q14 >= 2);
  const relationalFocus = (q11 === 0) && (layer2Ratio >= 0.3);

  // --- Decision Tree ---
  if (hardClinicalTrigger) {
    return "clinical";
  }
  if (clinicalFlagCount >= 3) {
    return "clinical";
  }
  if (clinicalFlagCount >= 2 && individualFocus) {
    return "clinical";
  }
  if (clinicalFlagCount >= 1 && individualFocus && !relationalFocus) {
    return "mixed";
  }
  if (clinicalFlagCount >= 2) {
    return "mixed";
  }
  if (relationalFocus && clinicalFlagCount === 0) {
    return "consultant";
  }
  if (relationalFocus && clinicalFlagCount === 1 && !individualFocus) {
    return "consultant";
  }
  // Default mixed for ambiguous
  return (layer2Ratio > 0.5 && !individualFocus) ? "consultant" : "mixed";
}

/* ============================================================
   GOOGLE SHEETS SUBMISSION
   ============================================================ */
async function submitToSheets(resultType) {
  if (APPS_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbw6GqB-hQIRJwcL1ruWOeVKbV-PSi7zCZIZFVPSTl3mvLAl4FQpcqmCWTIdLswR6ps/exec") return;

  const C = CONTENT[state.lang];
  const questions = C.questions;

  const payload = {
    timestamp: new Date().toISOString(),
    language: state.lang,
    name: state.userData.name,
    phone: state.userData.phone,
    age: state.userData.age,
    status: state.userData.status,
    result: resultType,
    hasSensitiveFlag: state.hasSensitiveFlag,
    ...Object.fromEntries(
      questions.map(q => [q.id, state.answers[q.id] ?? ""])
    ),
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      mode: "no-cors",
    });
  } catch (e) {
    console.warn("Submission failed silently:", e);
  }
}

/* ============================================================
   RENDER ENGINE
   ============================================================ */
function render() {
  const root = document.getElementById("app-root");
  root.innerHTML = "";

  const card = document.createElement("div");
  card.className = "card screen";

  switch (state.screen) {
    case "lang":     renderLang(card); break;
    case "intro":    renderIntro(card); break;
    case "data":     renderData(card); break;
    case "question": renderQuestion(card); break;
    case "result":   renderResult(card); break;
    case "loading":  renderLoading(card); break;
  }

  root.appendChild(card);
}

    <div class="lang-grid">
      <button class="lang-btn" id="btn-id" onclick="selectLang('id')">
        <span class="lang-flag">🇮🇩</span>
        <div class="lang-label">Bahasa Indonesia</div>
        <div class="lang-sublabel">Lanjut dengan Indonesia</div>
      </button>
      <button class="lang-btn" id="btn-en" onclick="selectLang('en')">
        <span class="lang-flag">🇬🇧</span>
        <div class="lang-label">English</div>
        <div class="lang-sublabel">Continue in English</div>
      </button>
    </div>
  `;
}

function selectLang(lang) {
  state.lang = lang;
  state.screen = "intro";
  render();
}

/* ---------- INTRO ---------- */
function renderIntro(card) {
  const C = CONTENT[state.lang].introScreen;
  const titleHtml = C.title.replace(/\n/g, "<br>");
  card.innerHTML = `
    <h1>${titleHtml}</h1>
    <p class="subtitle">${C.subtitle}</p>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:28px;">
      <div style="width:6px;height:6px;border-radius:50%;background:var(--rust);"></div>
      <span style="font-size:12px;color:var(--muted);letter-spacing:0.5px;">${C.duration}</span>
    </div>
    <button class="btn-primary" onclick="goToData()">${C.btn}</button>
    <button class="btn-secondary" onclick="goBack('lang')" style="margin-top:10px;">
      ${CONTENT[state.lang].back}
    </button>
  `;
}

function goToData() {
  state.screen = "data";
  render();
}

/* ---------- DATA COLLECTION ---------- */
function renderData(card) {
  const C = CONTENT[state.lang].dataScreen;
  const opts = C.fields.statusOpts.map(o =>
    `<option value="${o.value}">${o.label}</option>`
  ).join("");

  card.innerHTML = `
    <h2>${C.title}</h2>
    <p class="subtitle">${C.subtitle}</p>

    <div class="form-group">
      <label class="form-label" for="f-name">${C.fields.name}</label>
      <input class="form-input" id="f-name" type="text" placeholder="${C.fields.namePh}" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label" for="f-phone">${C.fields.phone}</label>
      <input class="form-input" id="f-phone" type="tel" placeholder="${C.fields.phonePh}" autocomplete="tel">
    </div>
    <div class="form-group">
      <label class="form-label" for="f-age">${C.fields.age}</label>
      <input class="form-input" id="f-age" type="number" placeholder="${C.fields.agePh}" min="17" max="99">
    </div>
    <div class="form-group">
      <label class="form-label" for="f-status">${C.fields.status}</label>
      <div class="select-wrap">
        <select class="form-select" id="f-status">${opts}</select>
      </div>
    </div>

    <div class="consent-box">
      <input type="checkbox" id="f-consent">
      <label class="consent-text" for="f-consent">${C.consent}</label>
    </div>

    <div class="error-msg" id="data-error"></div>

    <button class="btn-primary" onclick="submitData()">${C.btn}</button>
    <button class="btn-secondary" onclick="state.screen='intro';render()">
      ${CONTENT[state.lang].back}
    </button>
  `;

  // Restore previously entered data
  if (state.userData.name) document.getElementById("f-name").value = state.userData.name;
  if (state.userData.phone) document.getElementById("f-phone").value = state.userData.phone;
  if (state.userData.age) document.getElementById("f-age").value = state.userData.age;
  if (state.userData.status) document.getElementById("f-status").value = state.userData.status;
}

function submitData() {
  const C = CONTENT[state.lang].dataScreen;
  const name = document.getElementById("f-name").value.trim();
  const phone = document.getElementById("f-phone").value.trim();
  const age = parseInt(document.getElementById("f-age").value);
  const status = document.getElementById("f-status").value;
  const consent = document.getElementById("f-consent").checked;
  const errEl = document.getElementById("data-error");

  errEl.className = "error-msg";
  errEl.textContent = "";

  if (!name || !phone || !age || !status) {
    errEl.textContent = C.errRequired;
    errEl.className = "error-msg visible";
    return;
  }
  if (!consent) {
    errEl.textContent = C.errConsent;
    errEl.className = "error-msg visible";
    return;
  }
  if (!phone.match(/^[0-9+\s\-]{8,15}$/)) {
    errEl.textContent = C.errPhone;
    errEl.className = "error-msg visible";
    return;
  }
  if (isNaN(age) || age < 17 || age > 99) {
    errEl.textContent = C.errAge;
    errEl.className = "error-msg visible";
    return;
  }

  state.userData = { name, phone, age, status };
  state.currentQ = 0;
  state.answers = {};
  state.screen = "question";
  render();
}

/* ---------- QUESTION ---------- */
function renderQuestion(card) {
  const C = CONTENT[state.lang];
  const questions = C.questions;
  const q = questions[state.currentQ];
  const total = questions.length;
  const progress = ((state.currentQ) / total) * 100;
  const currentAnswer = state.answers[q.id];

  const qLabel = state.lang === "id"
    ? `Pertanyaan ${state.currentQ + 1} dari ${total}`
    : `Question ${state.currentQ + 1} of ${total}`;

  const optionsHtml = q.options.map((opt, i) => {
    const isSelected = currentAnswer === opt.value;
    const subHtml = opt.sub ? `<small>${opt.sub}</small>` : "";
    return `
      <button class="option-btn ${isSelected ? "selected" : ""}"
        onclick="selectAnswer('${q.id}', ${opt.value})">
        <span class="option-indicator"></span>
        <span class="option-label">
          <strong>${opt.label}</strong>
          ${subHtml}
        </span>
      </button>
    `;
  }).join("");

  const sensitiveHtml = q.sensitive ? `
    <div class="sensitive-notice">
      ${state.lang === "id"
        ? "Pertanyaan ini penting untuk keselamatanmu. Semua jawaban dijaga kerahasiaannya."
        : "This question is important for your safety. All answers are kept confidential."}
    </div>
  ` : "";

  const canProceed = currentAnswer !== undefined;

  card.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-label">
        <span>${qLabel}</span>
        <span>${Math.round(progress)}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>

    ${sensitiveHtml}

    <div class="question-number">
      ${state.lang === "id" ? `Layer ${q.layer}` : `Section ${q.layer}`}
    </div>
    <div class="question-text">${q.text}</div>
    ${q.sub ? `<div class="question-subtext">${q.sub}</div>` : ""}

    <div class="options-list">
      ${optionsHtml}
    </div>

    <button class="btn-primary" id="btn-next"
      onclick="goNext()"
      ${canProceed ? "" : "disabled"}>
      ${state.currentQ < total - 1
        ? (state.lang === "id" ? "Lanjut" : "Next")
        : (state.lang === "id" ? "Lihat Hasil" : "See Results")}
    </button>

    ${state.currentQ > 0 ? `
      <button class="btn-secondary" onclick="goPrev()">
        ${C.prev}
      </button>
    ` : `
      <button class="btn-secondary" onclick="state.screen='data';render()">
        ${C.back}
      </button>
    `}
  `;
}

function selectAnswer(qId, value) {
  state.answers[qId] = value;
  const buttons = document.querySelectorAll(".option-btn");
  const C = CONTENT[state.lang];
  const q = C.questions[state.currentQ];
  const opts = q.options;

  buttons.forEach((btn, i) => {
    btn.classList.toggle("selected", opts[i].value === value);
  });

  const nextBtn = document.getElementById("btn-next");
  if (nextBtn) nextBtn.disabled = false;
}

function goNext() {
  const C = CONTENT[state.lang];
  const questions = C.questions;

  if (state.currentQ < questions.length - 1) {
    state.currentQ++;
    state.screen = "question";
    render();
    window.scrollTo(0, 0);
  } else {
    finishAssessment();
  }
}

function goPrev() {
  if (state.currentQ > 0) {
    state.currentQ--;
    state.screen = "question";
    render();
    window.scrollTo(0, 0);
  }
}

/* ---------- FINISH & RESULT ---------- */
async function finishAssessment() {
  const resultType = computeResult();
  state.result = resultType;
  state.screen = "loading";
  render();

  await submitToSheets(resultType);

  state.screen = "result";
  render();
  window.scrollTo(0, 0);
}

function renderLoading(card) {
  const C = CONTENT[state.lang];
  card.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">${C.submitting}</div>
    </div>
  `;
}

function renderResult(card) {
  const C = CONTENT[state.lang].result;
  const R = C[state.result];
  const lang = state.lang;

  const badgeClass = {
    consultant: "badge-consultant",
    clinical: "badge-clinical",
    mixed: "badge-mixed",
  }[state.result];

  const iconClass = {
    consultant: "consultant",
    clinical: "clinical",
    mixed: "mixed",
  }[state.result];

  // Build WhatsApp URL
  const waMsg = encodeURIComponent(R.waMessage);
  const waUrl = `https://wa.me/${WA_NUMBER}?text=${waMsg}`;

  const waBtn = `
    <a href="${waUrl}" target="_blank" class="btn-wa">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.555 4.126 1.526 5.87L.057 23.926l6.256-1.642A11.935 11.935 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.787 9.787 0 01-5.031-1.394l-.361-.214-3.713.975.99-3.617-.235-.373A9.775 9.775 0 012.182 12C2.182 6.573 6.573 2.182 12 2.182S21.818 6.573 21.818 12 17.427 21.818 12 21.818z"/>
      </svg>
      ${R.ctaText}
    </a>
  `;

  let bodyHtml = "";

  if (state.result === "consultant") {
    bodyHtml = `
      <p class="result-explanation">${R.explanation}</p>
      <div class="what-next-title">${R.whatNext}</div>
      ${waBtn}
    `;
  } else if (state.result === "clinical") {
    bodyHtml = `
      <p class="result-explanation">${R.explanation}</p>
      <div class="what-next-title">${R.referralTitle}</div>
      <div class="referral-info">${R.referralInfo}</div>
      <div class="divider">${R.divider}</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:4px;">${R.noteText}</p>
      ${waBtn}
    `;
  } else {
    bodyHtml = `
      <p class="result-explanation">${R.explanation}</p>
      <div class="what-next-title">${R.whatNext}</div>
      <div class="referral-info">${R.referralInfo}</div>
      ${waBtn}
    `;
  }

  const sensitiveHtml = state.hasSensitiveFlag ? `
    <div class="sensitive-notice" style="margin-top:16px;">
      ${C.sensitiveAlert}
    </div>
  ` : "";

  const titleHtml = R.title.replace(/\n/g, "<br>");

  card.innerHTML = `
    <div class="result-header">
      <div class="result-icon ${iconClass}">${R.icon}</div>
      <div class="result-badge ${badgeClass}">${R.badge}</div>
      <h2>${titleHtml}</h2>
    </div>

    ${bodyHtml}
    ${sensitiveHtml}

    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:center;">
      <p style="font-size:11px;color:var(--muted);line-height:1.6;">
        ${lang === "id"
          ? "Assessment ini bukan diagnosis klinis. Hasilnya adalah gambaran awal — bukan kesimpulan. Kamu yang paling tahu situasimu dan kamu yang menentukan langkah selanjutnya."
          : "This assessment is not a clinical diagnosis. The result is an initial picture — not a conclusion. You know your situation best, and the next step is entirely yours to decide."}
      </p>
    </div>
  `;
}

/* ---------- BACK (generic) ---------- */
function goBack(screen) {
  state.screen = screen;
  render();
}

/* ============================================================
   INIT
   ============================================================ */
render();
</script>
</body>
</html>
